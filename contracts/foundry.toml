[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.17"
via_ir = true
optimizer = true
optimizer_runs = 200
evm_version = "london"
fs_permissions = [{ access = "read", path = "./test/fixtures" }, { access = "write", path = "./parity_out" }]

[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"
